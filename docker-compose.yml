version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: fruitshop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: fruitshop
      MYSQL_USER: fruitshop
      MYSQL_PASSWORD: fruitshop123
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backend/database/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - fruitshop-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fruitshop-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fruitshop?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: fruitshop
      SPRING_DATASOURCE_PASSWORD: fruitshop123
      JWT_SECRET: fruitshop_jwt_secret_key_2024_secure_random_string_at_least_256_bits
      JWT_EXPIRATION: 604800000
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - fruitshop-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fruitshop-frontend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - fruitshop-network

networks:
  fruitshop-network:
    driver: bridge

volumes:
  mysql_data:
